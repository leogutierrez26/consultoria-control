# Consultoría Control - entorno completo (RF-TEC-006)
# Levantar: docker compose up --build -d
services:
  postgres:
    image: postgres:16-alpine
    container_name: cc_postgres
    environment:
      POSTGRES_DB: consultoria
      POSTGRES_USER: consultoria
      POSTGRES_PASSWORD: consultoria
    volumes:
      - pgdata:/var/lib/postgresql/data   # persistencia (RF-TEC-007)
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U consultoria -d consultoria"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: cc_server
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://consultoria:consultoria@postgres:5432/consultoria
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: consultoria
      PGUSER: consultoria
      PGPASSWORD: consultoria
      PUBLIC_APP_URL: http://localhost:3000
      SMTP_HOST: ""        # modo simulado de correo por defecto
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads:/uploads   # archivos persistentes (RF-TEC-007)
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: cc_web
    depends_on:
      - server
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
